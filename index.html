<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Drinking in the Sun</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./public/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./public/icons/icon-192.png" />
  <link rel="stylesheet" href="./public/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="row">
      <div class="search">
        <input id="q" type="search" placeholder="Search for a pub" autocomplete="off" />
      </div>
      <button class="btn" id="nearMeBtn">Near me</button>
      <input class="date" id="datePick" type="date" />
    </div>
    <div class="weather" id="weatherStrip"></div>
    <div class="chips" id="chipRow"></div>
  </header>

  <main class="main">
    <h2>Sunniest pubs now</h2>
    <div class="rail" id="railNow"></div>

    <h2>Latest sun today</h2>
    <div class="rail" id="railLate"></div>

    <h3 id="countNote"></h3>
    <div class="list" id="listAll"></div>
  </main>

  <div class="sheetBackdrop" id="detailBackdrop" hidden></div>
  <div class="sheet" id="detailSheet" hidden>
    <div class="sheetHead">
      <div>
        <div class="title" id="dTitle"></div>
        <div class="sub" id="dAddr"></div>
      </div>
      <button class="btn" id="closeDetail">Close</button>
    </div>

    <div class="sheetBody">
      <div class="pill" id="dSpot"></div>

      <div class="row2">
        <div class="pill" id="selTimePill"></div>
        <input id="timeSlider" type="range" min="540" max="1380" step="5" value="900" />
      </div>

      <div class="bigPill" id="dSunPill"></div>

      <div class="row">
        <button class="btn" id="dirBtn">Directions</button>
        <button class="btn ghost" id="favBtn">Save</button>
      </div>

      <div class="bars" id="miniBars"></div>
    </div>
  </div>

  <script defer src="./public/app.js"></script>
</body>
</html>
